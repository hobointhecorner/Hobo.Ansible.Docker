---
- name: Ensure inbox prereqs removed
  become: true
  tags:
    - docker
  dnf:
    state: absent
    update_cache: true
    name:
      - docker
      - docker-client
      - docker-client-latest
      - docker-common
      - docker-latest
      - docker-latest-logrotate
      - docker-logrotate
      - docker-selinux
      - docker-engine-selinux
      - docker-engine

- name: Ensure repository
  become: true
  tags:
    - docker
  copy:
    source: files/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    owner: root
    group: root
    mode: "644"

- name: Ensure docker installed
  become: true
  register: docker_service
  tags:
    - docker
  dnf:
    update_cache: true
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

- name: Enable docker service
  when: docker_service.changed
  become: true
  tags:
    - docker
  systemd:
    name: docker.service
    enabled: true
    daemon_reload: true
    state: restarted
